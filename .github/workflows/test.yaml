on: [push, pull_request]
name: Test
jobs:
  test:
    strategy:
      matrix:
        go-version: [^1.18, stable]
        platform: [ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    - name: Checkout code
      uses: actions/checkout@v4
    # -race is what catches the process-lifecycle races between the caller and
    # the internal monitor goroutine; without it they stay invisible in CI.
    - name: Test
      run: go test -race -v ./